      TREX__ENDPOINT_URL: "http://${PROJECT_NAME:-d2e}-trex.${TLS__INTERNAL__DOMAIN:-alp.local}:33001"
      EG_ENV_WHITELIST: "KERNEL_USERNAME"
      EG_MAX_KERNELS_PER_USER: 1
    volumes:
