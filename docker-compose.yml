      PG__USER: ${PG__LOGTO_MANAGER_USER:-logto_postgres}
      PG__SSL: ${PG__SSL:-false}
      PG__SCHEMA: logto
      # LOGTO__CONNECTOR_CONFIG: '{ "id": "y9nq6f91yeg19kwt1x6xz","connectorId": "azuread-alp", "config": { "clientId": "${ENTRA__CLIENT_ID}", "tenantId": "${ENTRA__TENANT_ID}", "clientSecret": "${ENTRA__CLIENT_SECRET}", "cloudInstance": "https://login.microsoftonline.com"}, "syncProfile": true}'
      # LOGTO__DISABLE_BASIC_AUTH: ${LOGTO__DISABLE_BASIC_AUTH:-true}
      # LOGTO__CUSTOM_JWT: '{"environmentVariables": {"clientId": "${ENTRA__CLIENT_ID}", "tenantId": "${ENTRA__TENANT_ID}", "clientSecret": "${ENTRA__CLIENT_SECRET}"}, "script": "/**\n* This function is called during the access token generation process to get custom claims for the JWT token.\n* Limit custom claims to under 50KB.\n*\n* @param {Object} payload - The input payload of the function.\n* @param {AccessTokenPayload} payload.token -The JWT token.\n* @param {Context} payload.context - Logto internal data that can be used to pass additional information\n* @param {EnvironmentVariables} [payload.environmentVariables] - The environment variables.\n*\n* @returns The custom claims.\n*/\n\n// @ts-ignore\nconst getCustomJwtClaims = async ({ token, context, environmentVariables, extra }) => {\n  const clientId = environmentVariables?.clientId || \"\";\n  const clientSecret = environmentVariables?.clientSecret || \"\";\n  const tenantId = environmentVariables?.tenantId || \"\";\n  const refreshToken = extra.thirdPartyRefreshToken || \"\";\n\n  const tokenEndpoint = `https://login.microsoftonline.com/$${tenantId}/oauth2/v2.0/token`;\n\n  const params =\n    `client_id=$${encodeURIComponent(clientId)}` +\n    `&client_secret=$${encodeURIComponent(clientSecret)}` +\n    `&refresh_token=$${encodeURIComponent(refreshToken)}` +\n    `&grant_type=refresh_token` +\n    `&scope=openid`;\n\n  let thirdPartyToken = extra.thirdPartyToken;\n  try {\n    const response = await fetch(tokenEndpoint, {\n      method: \"POST\",\n      headers: { \"Content-Type\": \"application/x-www-form-urlencoded\" },\n      body: params,\n    });\n\n    if (!response.ok) {\n      const responseBody = await response.text();\n      throw new Error(`Error refreshing token: $${response.statusText}: $${responseBody}: $${params}`);\n    }\n\n    const data = await response.json();\n    thirdPartyToken = data.id_token;\n  } catch (error) {\n    throw error;\n  }\n\n  return { thirdPartyToken };\n};\n", "tokenSample": {"aud": "http://localhost:3000/api/test", "gty": "authorization_code", "jti": "f1d3d2d1-1f2d-3d4e-5d6f-7d8a9d0e1d2", "kind": "AccessToken", "scope": "read write", "grantId": "grant_123", "clientId": "my_app", "accountId": "uid_123"}, "contextSample": {"user": {"id": "123", "name": "Foo Bar", "roles": [], "avatar": "https://example.com/avatar.png", "profile": {}, "username": "foo", "customData": {}, "identities": {}, "hasPassword": false, "primaryEmail": "foo@logto.io", "primaryPhone": "+1234567890", "applicationId": "my-app", "organizations": [], "ssoIdentities": [], "organizationRoles": [], "mfaVerificationFactors": []}}}'
      LOGTO__CLIENT_APPS: '[{"name":"alp-svc","description":"alp-svc","type":"MachineToMachine", "id": "${LOGTO__ALP_SVC__CLIENT_ID}", "secret": "${LOGTO__ALP_SVC__CLIENT_SECRET}"},{"name":"alp-data","description":"alp-data","type":"MachineToMachine", "id": "${LOGTO__ALP_DATA__CLIENT_ID}", "secret": "${LOGTO__ALP_DATA__CLIENT_SECRET}"},{"name":"alp-app","description":"alp-app","type":"Traditional", "id": "${LOGTO__ALP_APP__CLIENT_ID}", "secret": "${LOGTO__ALP_APP__CLIENT_SECRET}", "oidcClientMetadata":{"redirectUris":["https://${CADDY__ALP__PUBLIC_FQDN:-localhost}${PORT:+:${PORT:-443}}/portal/login-callback","https://localhost:4000/portal/login-callback","https://localhost:8081"],"postLogoutRedirectUris":["https://${CADDY__ALP__PUBLIC_FQDN:-localhost}${PORT:+:${PORT:-443}}/portal","https://localhost:4000/portal","https://localhost:8081"]},"customClientMetadata":{"corsAllowedOrigins":[],"refreshTokenTtlInDays":14,"alwaysIssueRefreshToken":true,"rotateRefreshToken":true}}]'
      LOGTO__RESOURCE: '{"name":"alp-default","indicator":"https://alp-default","accessTokenTtl":3600}'
      LOGTO__USER: '{"username":"admin","initialPassword":"Updatepassword12345"}'
      LOGTO__ROLES: '[{"name":"role.systemadmin","description":"ALP System admin","type":"User"},{"name":"role.useradmin","description":"ALP User admin","type":"User"},{"name":"role.dashboardviewer","description":"ALP Dashboard viewer","type":"User"}]'
      LOGTO__SCOPES: '[{"name":"role.systemadmin","description":"ALP System admin"},{"name":"role.useradmin","description":"ALP User admin"},{"name":"role.dashboardviewer","description":"ALP Dashboard viewer"}]'
      LOGTO__ADMIN_SERVER__FQDN_URL: "http://${PROJECT_NAME:-d2e}-logto-1:3002"
      LOGTO__CLIENTID_PASSWORD__BASIC_AUTH: ${LOGTO__CLIENTID_PASSWORD__BASIC_AUTH}
      LOGTO__ALP_ADMIN_APP: '{"application": {"id": "${LOGTO_API_M2M_CLIENT_ID}", "name":"alp-admin","description":"alp-admin", "secret": "${LOGTO_API_M2M_CLIENT_SECRET}"}, "role": { "name":"api-access","description":"Logto API access"}}'
      CADDY__ALP__PUBLIC_FQDN: ${CADDY__ALP__PUBLIC_FQDN:-localhost}${PORT:+:${PORT:-443}}

  alp-logto:
    container_name: &c8 ${PROJECT_NAME:-d2e}-logto-1
    depends_on:
      alp-minerva-pg-mgmt-init:
        condition: service_completed_successfully
    healthcheck:
      interval: 20s
      retries: 30
      start_period: 120s
      test:
        - CMD
        - wget
        - --proxy
        - off
        - -O
        - logto.status
        - http://localhost:3001/api/status
    hostname: ${PROJECT_NAME:-d2e}-logto-1.${TLS__INTERNAL__DOMAIN:-alp.local}
    platform: linux/amd64
    image: ${DOCKER_IMAGE_PREFIX:-ghcr.io/ohdsi/}d2e-logto:${DOCKER_TAG_NAME:-develop}
    logging:
      options:
        tag: *c8
    networks:
      alp:
        priority: 20
      data:
        priority: 10
    # Enable if need to access admin console
    # ports:
    #  - 3002:3002
    entrypoint:
      - sh
      - -c
      - npm run cli db seed -- --swe && npx @logto/cli db alteration rollback 1.23.0 && npx @logto/cli db alteration deploy 1.23.1 && npm start
    restart: ${DOCKER__RESTART_POLICY:-unless-stopped}
    environment:
      <<:
        - *x-tls
      ADMIN_DISABLE_LOCALHOST: ${LOGTO__DISABLE_ADMIN_CONSOLE:-false}
      # ADMIN_ENDPOINT: http://${CADDY__ALP__PUBLIC_FQDN:-localhost}:3002 # Enable if need to access admin console
      DB_URL: postgres://${PG__LOGTO_MANAGER_USER:-logto_postgres}:${PG__LOGTO_MANAGER_PASSWORD}@${PG_HOST:-${PROJECT_NAME:-d2e}-minerva-postgres-1}:${PG_PORT:-5432}/${PG_DB_NAME:-alp}
      ENDPOINT: https://${CADDY__ALP__PUBLIC_FQDN:-localhost}${PORT:+:${PORT:-443}}
      LOGTO_API_M2M_CLIENT_ID: ${LOGTO_API_M2M_CLIENT_ID}
      LOGTO_API_M2M_CLIENT_SECRET: ${LOGTO_API_M2M_CLIENT_SECRET}
      LOGTO_ROLES_AZ_GROUPS_MAPPING: ${LOGTO_ROLES_AZ_GROUPS_MAPPING:-{"role.systemadmin":"37b5364a-348c-494f-b67f-a59a40e52ab7","role.useradmin":"90597adc-92af-4649-8151-68c3b7feb66c","role.dashboardviewer":"50a3b140-21eb-46dd-9d81-61a77cbc81f5"}}
      NODE_ENV: test
      PROJECT_NAME: ${PROJECT_NAME:-d2e}
      PORT: 3001
      TRUST_PROXY_HEADER: true
      DATABASE_CONNECTION_TIMEOUT: 30000

  alp-minerva-postgres:
    container_name: &c17 ${PROJECT_NAME:-d2e}-minerva-postgres-1
    healthcheck:
      interval: 20s
      retries: 30
      start_period: 60s
      test:
        - CMD-SHELL
        - pg_isready
        - -d
        - ${POSTGRES_DB}
      timeout: 30s
    hostname: ${PROJECT_NAME:-d2e}-minerva-postgres-1.${TLS__INTERNAL__DOMAIN:-alp.local}
    image: postgres:15-alpine
    logging:
      options:
        tag: *c17
    networks:
      alp:
        priority: 20
      data:
        priority: 10
    restart: ${DOCKER__RESTART_POLICY:-unless-stopped}
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
    shm_size: 1gb
    volumes:
      - pg-minerva-data-1:/var/lib/postgresql/data
      - ./cache/pgbackup:/backup
    environment:
      <<:
        - *x-tls
      POSTGRES_DB: ${PG_DB_NAME:-alp}
      POSTGRES_PASSWORD: ${PG_SUPER_PASSWORD}

  alp-minerva-s3:
    command:
      - server
      - /data
      - --console-address
      - :9090
    container_name: &c19 ${PROJECT_NAME:-d2e}-minerva-s3
    healthcheck:
      interval: 20s
      retries: 30
      start_period: 60s
      test:
        - CMD
        - curl
        - -I
        - http://${PROJECT_NAME:-d2e}-minerva-s3:9000/minio/health/live
      timeout: 30s
    hostname: ${PROJECT_NAME:-d2e}-minerva-s3.${TLS__INTERNAL__DOMAIN:-alp.local}
    image: minio/minio:RELEASE.2023-10-25T06-33-25Z
    logging:
      options:
        tag: *c19
    networks:
      alp:
        priority: 20
      data:
        priority: 10

    restart: ${DOCKER__RESTART_POLICY:-unless-stopped}
    volumes:
      - minio-data-1:/data
    environment:
      <<:
        - *x-tls
      MINIO_ROOT_PASSWORD: ${MINIO__SECRET_KEY}
      MINIO_ROOT_USER: ${MINIO__ACCESS_KEY:-root}
    profiles: [minio]

  alp-minio-post-init:
    container_name: &c23 ${PROJECT_NAME:-d2e}-minio-post-init
    depends_on:
      alp-minerva-s3:
        condition: service_healthy
    hostname: ${PROJECT_NAME:-d2e}-minio-post-init.${TLS__INTERNAL__DOMAIN:-alp.local}
    image: minio/mc
    logging:
      options:
        tag: *c23
    networks:
      alp:
        priority: 20
    entrypoint: |
      /bin/sh -c " /usr/bin/mc config host add myminio http://${PROJECT_NAME:-d2e}-minerva-s3:9000 ${MINIO__ACCESS_KEY:-root} ${MINIO__SECRET_KEY};
      /usr/bin/mc mb -p myminio/dataflow-adhoc-flows;
      /usr/bin/mc mb -p myminio/flows/results;
      /usr/bin/mc mb -p myminio/dicom-images;
      /usr/bin/mc policy download myminio/dataflow-adhoc-flows;
      exit 0;
      "
    profiles: [minio]

  alp-cachedb:
    container_name: &c30 ${PROJECT_NAME:-d2e}-cachedb
    hostname: ${PROJECT_NAME:-d2e}-cachedb.${TLS__INTERNAL__DOMAIN:-alp.local}
    image: ${DOCKER_IMAGE_PREFIX:-ghcr.io/ohdsi/}d2e-cachedb:${DOCKER_TAG_NAME:-develop}
    platform: linux/amd64
    depends_on:
      trex:
        condition: service_healthy
      alp-logto-post-init:
        condition: service_completed_successfully
      alp-minerva-pg-mgmt-init:
        condition: service_completed_successfully
    healthcheck:
      interval: 20s
      retries: 5
      start_period: 120s
      test: ["CMD", "python", "src/utils/healthcheck.py", "41191"]
      timeout: 10s
    logging:
      options:
        tag: *c30
    networks:
      alp:
        priority: 20
      data:
        priority: 10
    restart: ${DOCKER__RESTART_POLICY:-unless-stopped}
    volumes:
      - cachedb-data-1:/home/docker/duckdb_data
      - cdw-config-cachedb-data-1:/home/docker/cdw_svc/duckdb_data # Volume for dynamically generated cdw-config duckdb file (refer to docs/3-configure/9-create-cdw-config-duckdb-file.md for information)
    environment:
      <<:
        - *x-converter
        - *x-routes
        - *x-tls
        - *cachedb
