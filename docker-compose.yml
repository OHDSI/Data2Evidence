        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://${PROJECT_NAME:-d2e}-supabase-storage-1:9000/status"
        ]
      timeout: 30s
      interval: 5s
      retries: 10
      start_period: 15s
    image: supabase/storage-api:v1.14.5
    logging:
      options:
        tag: *c19
    networks:
      alp:
        priority: 20
      data:
        priority: 10
    restart: ${DOCKER__RESTART_POLICY:-unless-stopped}
    volumes:
      - supabase-storage-data:/var/lib/storage
    entrypoint: ["/bin/sh", "-c"]
    command: > # Wait 30 seconds for trex to finish migrations
      "echo 'Waiting 30 seconds before starting...' && sleep 30 && echo 'Starting server now' && node dist/start/server.js"

    environment:
      <<:
        - *x-tls
      PROJECT_REF: ${PROJECT_REF:-default}
      PORT: 9000
      FILE_SIZE_LIMIT: 52428800
      DATABASE_URL: postgres://${PG_SUPER_USER:-postgres}:${PG_SUPER_PASSWORD}@${PG_HOST:-${PROJECT_NAME:-d2e}-minerva-postgres-1}:${PG_PORT:-5432}/${PG_DB_NAME:-alp}
      PGRST_JWT_SECRET: ${SUPABASE_STORAGE_JWT_SECRET:-mysecret}
      SERVICE_KEY: ${SUPABASE_STORAGE_JWT_TOKEN:-mytoken}
      MIGRATIONS_SCHEMA: storage
      MIGRATIONS_TABLE: migrations
      SKIP_MIGRATIONS: "true"
      STORAGE_BACKEND: file
      GLOBAL_S3_BUCKET: stub
      GLOBAL_S3_ENDPOINT: http://supabase-storage:9000/s3
      GLOBAL_S3_PROTOCOL: "http"
      GLOBAL_S3_FORCE_PATH_STYLE: true
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub

  supabase-storage-post-init:
    container_name: ${PROJECT_NAME:-d2e}-supabase-storage-post-init-1
    image: postgres:15-alpine
    depends_on:
      supabase-storage:
        condition: service_healthy
    networks:
      alp:
        priority: 20
    environment:
      PGHOST: ${PG_HOST:-${PROJECT_NAME:-d2e}-minerva-postgres-1}
      PGPORT: ${PG_PORT:-5432}
      PGDATABASE: ${PG_DB_NAME:-alp}
      PGUSER: ${PG_SUPER_USER:-postgres}
      PGPASSWORD: ${PG_SUPER_PASSWORD}
    command: >
      sh -c "
        echo 'Updating public.objects view to include user_metadata column...' &&
        psql -c 'ALTER TABLE storage.objects DISABLE ROW LEVEL SECURITY;' &&
        psql -c 'CREATE OR REPLACE VIEW public.objects AS SELECT * FROM storage.objects;' &&
        echo 'Granting permissions on updated view...' &&
        psql -c 'GRANT SELECT, INSERT, UPDATE, DELETE ON public.objects TO service_role;' &&
        echo 'Supabase Storage post-initialization complete!' &&
        exit 0
      "

