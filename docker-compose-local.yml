services:
  trex:
    # Build/run native to the host (overrides the amd64 pin in docker-compose.yml).
    platform: ${TREX_PLATFORM:-linux/amd64}
    build:
      context: ./services/trex
      dockerfile: ./Dockerfile.v2
      platforms:
        - ${TREX_PLATFORM:-linux/amd64}
      # GitHub Packages token for installing @ohdsi/* plugins (the Pythia agent).
      secrets:
        - github_token
      args:
        PLUGINS_FROM_REGISTRY: ${PLUGINS_FROM_REGISTRY:-@data2evidence/d2e-ui @data2evidence/d2e-functions @data2evidence/fhir @data2evidence/d2e-flows @data2evidence/i2b2-flow @data2evidence/search-embedding-flow @data2evidence/data-management-flow @data2evidence/hades-flow @data2evidence/loyalty-score-flow @data2evidence/data-transformation-flow @ohdsi/pythia-agent@0.0.1-develop.2.g8edf28a}
    networks:
      alp:
        aliases:
          - ${PROJECT_NAME:-alp}-trex.${TLS__INTERNAL__DOMAIN:-alp.local}
    ports:
      - 9229:9229
      - 25432:5432
      - 25433:5433
      - 33000:33000
      - 8094:8094
    volumes:
      - trex:/usr/src/data  # Persist plugins and cache data - must match PLUGINS_PATH
      - ${D2E_FUNCTIONS:-./plugins/functions}:/usr/src/plugins/d2ef
      - ${D2E_FHIRFUNCTIONS:-./plugins/fhir_functions}:/usr/src/plugins/fhir
      - ./plugins/atlas:/usr/src/plugins/atlas  # Atlas UI plugin
      # - ./plugins/chat_functions:/usr/src/plugins/chat
      # - ./plugins/ui/package.json:/usr/src/plugins/d2e-ui/package.json # For local ui development only
      # - ./plugins/ui/resources:/usr/src/plugins/d2e-ui/resources # For local ui development only
      # - ./plugins/ui/resources:/usr/src/local-resources # For CI ui build mounting
      - ./services/trex/core:/usr/src/core  # live trex core for local dev
      # - ./services/trex/deno.json:/usr/src/deno.json
      # - ./plugins/flows/base/package.json:/usr/src/plugins/d2e-flows/package.json # For local flows development only
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      RUST_BACKTRACE: ${RUST_BACKTRACE:-full}
      LOCAL_DEBUG: "true"
      DATABASE_CREDENTIALS: ${DATABASE_CREDENTIALS:-{}}
      # Bind-mounted source plugins win over bundled ones with the same package name.
      PLUGINS_DEV_PATH: "/usr/src/bundled-plugins:/usr/src/plugins"
      SQL_QUERY_TEMPLATES: '{"cohort-members": "SELECT {{COHORT_ID}} AS cohort_id, CURRENT_TIMESTAMP AS exported_at", "patient-count": "SELECT COUNT(*) AS patient_count FROM {{SCHEMA}}.person"}'
      SWARM_CONFIG: |-
        {
          "cluster_id": "d2e",
          "nodes": {
            "d2e": {
              "gossip_addr": "0.0.0.0:4200",
              "extensions": [
                {
                  "name": "trexas",
                  "config": {
                    "host": "0.0.0.0",
                    "port": 33001,
                    "main_service_path": "/usr/src/core/server",
                    "event_worker_path": "/usr/src/core/event",
                    "tls_port": 33000,
                    "tls_cert_path": "/usr/src/cert/cert.pem",
                    "tls_key_path": "/usr/src/cert/key.pem",
                    "inspector": "inspect:0.0.0.0:9229"
                  }
                },
                {
                  "name": "pgwire",
                  "config": { "host": "0.0.0.0", "port": 5433 }
                }
              ]
            }
          }
        }
      WATCH: |-
        {
          "analytics-svc": false,
          "mri-pg-config": false,
          "fhir-gateway": false,
          "alp-dataflow-gen-init": false,
          "query-gen-svc": false,
          "alp-usermgmt": false,
          "bookmark-svc": false,
          "mri-pa-config": false,
          "cdw-svc": false,
          "jobplugins": false,
          "dataset": false,
          "alpdb": false,
          "concept-mapping": false,
          "terminology-svc": false,
          "code-suggestion": false,
          "data-mapping": false,
          "portal": false,
          "files-manager": false,
          "demo": false,
          "d2e-webapi": false,
          "perseus": false,
          "white-rabbit": false,
          "strategus-analysis": false,
          "mcp-server": false
        }

  alp-caddy:
    ports:
      - 41000:41000
      - 41130:41130
    environment:
      CADDY__FHIR_SERVER__PUBLIC_FQDN: ${CADDY__FHIR_SERVER__PUBLIC_FQDN:-localhost}
      CADDY__CORS_LOCAL_UI: "import cors"

  alp-dataflow-gen:
    ports:
      - 41120:41120
    environment:
      SYSTEM_PORTAL__API_URL: https://trex:33000/system-portal/
  alp-dataflow-gen-worker:
    build:
      context: ./services/alp-dataflow-gen-worker
      dockerfile: Dockerfile

  alp-logto:
    build:
      context: ./services/alp-logto
      dockerfile: Dockerfile
    # volumes:
    #   - ./services/alp-logto/connector-alp-azuread/lib:/etc/logto/packages/connectors/connector-alp-azuread/lib

  alp-minerva-pg-mgmt-init:
    ports:
      - 9211:9211
    build:
      context: services/alp-pg-management
      dockerfile: Dockerfile
    volumes:
      - ./services/alp-pg-management/app:/home/docker/app

  alp-minerva-postgres:
    ports:
      - 41190:5432
      # - 5432:5432  # 41190 already exposes it; avoids clashing with other local stacks

  demodb:
    ports:
      - "15432:5432"

  dicom-server:
    # uses 8042 port on the container
    ports:
      - 8042:8042

  alp-logto-post-init:
    build:
      context: ./services/alp-logto/post-init
      dockerfile: Dockerfile
    # volumes:
    #   - ./services/alp-logto/post-init:/home/docker


  enterprise-gateway:
    build:
      context: ./services/enterprise-gateway
      dockerfile: Dockerfile
    environment:
      EG_ALLOW_ORIGIN: "https://${CADDY__D2E__PUBLIC_FQDN:-${CADDY__ALP__PUBLIC_FQDN:-localhost}}${PORT:+:${PORT:-41100}}"
    volumes:
      - ./services/enterprise-gateway/r-strategus-lib/rD2E:/app/rD2E
      - ./services/enterprise-gateway/kernels/R_ohdsi_docker:/usr/local/share/jupyter/kernels/R_ohdsi_docker
  
  enterprise-gateway-viewer:
    build:
      context: ./services/enterprise-gateway
      dockerfile: Dockerfile
    environment:
      EG_ALLOW_ORIGIN: "https://${CADDY__D2E__PUBLIC_FQDN:-${CADDY__ALP__PUBLIC_FQDN:-localhost}}${PORT:+:${PORT:-41100}}"
    volumes:
      - ./services/enterprise-gateway/r-strategus-lib/rD2E:/app/rD2E
      - ./services/enterprise-gateway/kernels/R_ohdsi_docker:/usr/local/share/jupyter/kernels/R_ohdsi_docker

  supabase-storage:
    build:
      context: ./services/supabase-storage
      dockerfile: Dockerfile

  logging:
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOZZLE_ENABLE_SHELL=${DOZZLE_ENABLE_SHELL:-false}
      - DOZZLE_ENABLE_ACTIONS=true

  materialize-cohorts:
    profiles:
      - materialize-cohorts
    networks:
      alp:
        priority: 20
    command: npm run start
    hostname: ${PROJECT_NAME:-d2e}-materialize-cohorts
    image: ${DOCKER_IMAGE_PREFIX:-ghcr.io/ohdsi/}d2e-materialize-cohorts:${DOCKER_TAG_NAME:-develop}
    build:
      context: .
      dockerfile: ./services/materialize-cohorts/Dockerfile
    volumes:
      - services/materialize-cohorts/PKI/server.key:/app/PKI/server.key
      - services/materialize-cohorts/PKI/server.crt:/app/PKI/server.crt
      - services/materialize-cohorts/PKI/ca.crt:/app/PKI/ca.crt
    environment:
      PORT: 3333
      INSTALL_SQLALCHEMY_HANA: ${INSTALL_SQLALCHEMY_HANA:-false}
      API_MTLS_ENABLED: ${MATERIALIZE_COHORTS_API_MTLS_ENABLED:-true}
      API_TLS_KEY_PATH: ${MATERIALIZE_COHORTS_API_TLS_KEY_PATH:-/app/PKI/server.key}
      API_TLS_CERT_PATH: ${MATERIALIZE_COHORTS_API_TLS_CERT_PATH:-/app/PKI/server.crt}
      API_TLS_CA_PATH: ${MATERIALIZE_COHORTS_API_TLS_CA_PATH:-/app/PKI/ca.crt}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSk https://127.0.0.1:3333/health"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 10s

# Build-time GitHub Packages token for installing @ohdsi/* plugins.
secrets:
  github_token:
    environment: GITHUB_TOKEN
