name: d2e/services Docker Build (called)

on:
  workflow_call:
    inputs:
      AZ_REG_REPOSITORY:
        required: true
        type: string
      DOCKER_BUILD_ARG1:
        default: ""
        required: false
        type: string
      DOCKER_BUILD_CONTEXT_PATH:
        default: "."
        required: false
        type: string
      DOCKER_BUILD_FILE_PATH:
        required: true
        type: string
      DOCKER_BUILD_PULL_BOOL_STR:
        default: "false"
        required: false
        type: string
      DOCKER_BUILD_PUSH_BOOL_STR:
        default: "false"
        required: false
        type: string
      DOCKER_IMG_TAG_NAME:
        required: true
        type: string
      GIT_BRANCH_NAME:
        required: true
        type: string
      GIT_REPO_FULL_NAME:
        required: true
        type: string
      GIT_SSH_PRIVATE_KEY1:
        default: ""
        required: false
        type: string
      GIT_SSH_PRIVATE_KEY2:
        default: ""
        required: false
        type: string

jobs:
  build-push-prune:
    environment: ${{github.event_name == 'workflow_dispatch' && 'dockerhub' || 'github'}}
    name: ${{ inputs.AZ_REG_REPOSITORY }}
    runs-on: ubuntu-latest
    env:
      AZ_REG_REPOSITORY: ${{ inputs.AZ_REG_REPOSITORY }}
      DOCKER_BUILD_ARG1: ${{ inputs.DOCKER_BUILD_ARG1 }}
      DOCKER_BUILD_CONTEXT_PATH: ${{ inputs.DOCKER_BUILD_CONTEXT_PATH }}
      DOCKER_BUILD_DISABLE: ${{ vars.DOCKER_BUILD_DISABLE || 'false' }}
      DOCKER_BUILD_FILE_PATH: ${{ inputs.DOCKER_BUILD_FILE_PATH }}
      DOCKER_BUILD_PULL_BOOL_STR: ${{ inputs.DOCKER_BUILD_PULL_BOOL_STR }}
      DOCKER_BUILD_PUSH_BOOL_OVERRIDE: ${{ vars.DOCKER_BUILD_PUSH_BOOL_OVERRIDE || 'false' }}
      DOCKER_BUILD_PUSH_BOOL_STR: ${{ inputs.DOCKER_BUILD_PUSH_BOOL_STR }}
      DOCKER_IMG_TAG_NAME: ${{ inputs.DOCKER_IMG_TAG_NAME }}
      GIT_BRANCH_NAME: ${{ inputs.GIT_BRANCH_NAME }}
      GIT_REPO_FULL_NAME: ${{ inputs.GIT_REPO_FULL_NAME }}
      GIT_SSH_PRIVATE_KEY1: ${{ inputs.GIT_SSH_PRIVATE_KEY1 }}
      GIT_SSH_PRIVATE_KEY2: ${{ inputs.GIT_SSH_PRIVATE_KEY2 }}
      REG_URL: ${{github.event_name == 'workflow_dispatch' && 'registry.hub.docker.com/data2evidence' || 'ghcr.io/ohdsi'}}

    steps:
      - name: Free Disk Space (Ubuntu)
        if: ${{ env.DOCKER_BUILD_DISABLE != 'true' }}
        uses: jlumbroso/free-disk-space@main
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: false
          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: true

      - uses: actions/checkout@v4
        with:
          ref: ${{ env.GIT_BRANCH_NAME }}
          repository: ${{ env.GIT_REPO_FULL_NAME }}

      - name: Prepare
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "$DOCKER_BUILD_ARG1" == 'true' ]]; then
            echo "DOCKER_BUILD_ARG1=GITHUB_PAT=$GITHUB_PAT" >> $GITHUB_ENV
          fi
          
      - name: 'Login to GitHub Container Registry'
        uses: docker/login-action@v3
        if: ${{ job.environment == 'github' }}
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: 'Login to Docker Container Registry'
        uses: docker/login-action@v3
        if: ${{ job.environment == 'dockerhub' }}
        with:
          registry: registry.hub.docker.com
          username: data2evidence
          password: ${{secrets.DOCKER_TOKEN}}

      - uses: docker/setup-buildx-action@v3
        if: ${{ env.DOCKER_BUILD_DISABLE != 'true' }}
        id: builder

      - name: Build and push
        uses: docker/build-push-action@v6
        if: ${{ env.DOCKER_BUILD_DISABLE != 'true' }}
        with:
          builder: ${{ steps.builder.outputs.name }}
          # cache-from: type=gha
          # cache-to: type=gha,mode=max
          # ulimit: nofile=1048576:1048576
          platforms: "linux/amd64"
          pull: ${{ env.DOCKER_BUILD_PULL_BOOL_STR == 'true' }}
          push: ${{ env.DOCKER_BUILD_PUSH_BOOL_STR == 'true' }}
          context: ${{ env.DOCKER_BUILD_CONTEXT_PATH }}
          file: ${{ env.DOCKER_BUILD_FILE_PATH }}
          tags: ${{ env.REG_URL }}/${{ env.AZ_REG_REPOSITORY }}:${{ env.DOCKER_IMG_TAG_NAME }}
          build-args: |
            BUILD_TYPE=OSS
            ${{ env.DOCKER_BUILD_ARG1 }}
      - name: delete-untagged-images
        uses: actions/delete-package-versions@v5
        if: ${{ job.environment == 'github' }}
        with:
          package-name: ${{ env.AZ_REG_REPOSITORY }}
          package-type: "container"
          min-versions-to-keep: 3
          delete-only-untagged-versions: "true"
