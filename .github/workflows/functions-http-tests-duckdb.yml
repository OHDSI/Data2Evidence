name: HTTP Tests DuckDB

permissions:
  contents: read

on:
  workflow_dispatch: # Allow manual triggering
  pull_request:
    types: [opened, ready_for_review, reopened, synchronize]
  merge_group:
  push:
    branches:
      - develop

env:
  VERSION: develop
  PLUGINS_SEED: '["d2e-flows", "d2e-ui", "d2e-atlas", "data-transformation-flow", "hades-flow", "trex-hana", "trex-pgwire", "i2b2-flow", "data-management-flow"]'
  PGUSER: postgres
  PGPASSWORD: mypass
  PGHOST: localhost
  PGPORT: 15432
  PGDATABASE: postgres
  TESTSCHEMA: demo_cdm
  isTestEnv: "true"
  isHttpTestRun: "true"
  HTTPTEST_DB_DIALECT: "duckdb"

jobs:
  pick_runner:
    runs-on: ubuntu-latest
    if: (github.ref_name == 'develop' ||  contains(github.ref_name, 'release/') || github.event_name == 'workflow_dispatch' || github.event_name == 'merge_group') || ( github.event_name == 'pull_request' && !github.event.pull_request.draft ) # Should run if branch is develop/release/workflow_dispatch and doesnt have a PR
    outputs:
      random_runner: ${{ steps.shuffle.outputs.random_runner }}
    steps:
      - id: shuffle
        run: echo "random_runner=$(shuf -e ubuntu-22.04 ubuntu-24.04 | head -n 1)" >> "$GITHUB_OUTPUT"

  check_file_changes:
    runs-on: ubuntu-latest
    if: (github.ref_name == 'develop' ||  contains(github.ref_name, 'release/') || github.event_name == 'workflow_dispatch' || github.event_name == 'merge_group') || ( github.event_name == 'pull_request' && !github.event.pull_request.draft ) # Should run if branch is develop/release/workflow_dispatch and doesnt have a PR
    outputs:
      changes: ${{ steps.file_changes.outputs.src }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dorny/paths-filter@v3
        id: file_changes
        with:
          initial-fetch-depth: 1
          filters: |
            src:
              - "functions/_shared/alp-libs/nodejs/**"
              - "functions/analytics-svc/**"
              - "functions/bookmark-svc/**"
              - "functions/cdw-svc/**"
              - "functions/mri-pa-config/**"
              - "functions/mri-pg-config/**"
              - "functions/query-gen-svc/**"
              - "services/mri-db/**"
              - "services/alp-logto/**"
              - "services/alp-pg-management/**"
              - "package.json"
              - "docker-compose.yml"
              - "scripts/**"
              - ".github/workflows/functions-http-tests-duckdb.yml"

  demosetup:
    needs: [pick_runner, check_file_changes]
    if: (github.ref_name == 'develop' || contains(github.ref_name, 'release/') || github.event_name == 'workflow_dispatch' || github.event_name == 'merge_group') || ( github.event_name == 'pull_request' && !github.event.pull_request.draft && needs.check_file_changes.outputs.changes == 'true' ) # Should run if branch is develop/release/workflow_dispatch and doesnt have a PR
    runs-on: ${{ needs.pick_runner.outputs.random_runner }}
    timeout-minutes: 80
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: true

          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Increase swapfile to 15G
        run: |
          sudo swapoff -a
          sudo fallocate -l 15G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          sudo swapon --show

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: npm install
        if: success() || failure()
        run: |
          npm install

      # - name: Patch seed config for e2e tests
      #   run: node ./scripts/patch-seed-for-e2e.js

      - name: Initialise d2e
        if: success() || failure()
        id: init
        run: |
          init_choice=y ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v develop init
          grep LOGTO__D2E_APP__CLIENT_ID .env | sed -e "s/'//g" >> $GITHUB_ENV

      - uses: dorny/paths-filter@v3
        id: file_changes
        with:
          initial-fetch-depth: 1
          filters: |
            flow_base:
              - "flows/base/**"
            flow_i2b2:
              - "flows/i2b2/**"
            flow_data_management:
              - "flows/data_management/**"
            ui: 
              - "ui/**"

      - name: Build Flow base docker image
        if: steps.file_changes.outputs.flow_base == 'true'
        id: build_flow_base_image
        run: |
          docker build --build-arg GIT_COMMIT_ARG=${{ github.sha }} --build-arg BUILD_TYPE=OSS --build-arg GITHUB_PAT=${{ secrets.GITHUB_TOKEN }} --file ./flows/base/Dockerfile --platform linux/amd64 --attest type=provenance,disabled=true --tag ghcr.io/ohdsi/d2e/flow-base:develop ./flows
        
      - name: Build i2b2 docker image
        if: steps.file_changes.outputs.flow_i2b2 == 'true'
        id: build_i2b2_image
        run: |
          docker build --build-arg GIT_COMMIT_ARG=${{ github.sha }} --build-arg BUILD_TYPE=OSS --build-arg GITHUB_PAT=${{ secrets.GITHUB_TOKEN }} --file ./flows/i2b2/Dockerfile --platform linux/amd64 --attest type=provenance,disabled=true --tag ghcr.io/ohdsi/d2e/flow-i2b2:develop ./flows

      - name: Build data management docker image
        if: steps.file_changes.outputs.flow_data_management == 'true'
        id: build_dm_image
        run: |
          docker build --build-arg GIT_COMMIT_ARG=${{ github.sha }} --build-arg BUILD_TYPE=OSS --build-arg GITHUB_PAT=${{ secrets.GITHUB_TOKEN }} --file ./flows/data_management/Dockerfile --platform linux/amd64 --attest type=provenance,disabled=true --tag ghcr.io/ohdsi/d2e/flow-data-management:develop ./flows

      - name: Build docker images
        if: success() || failure()
        id: pull
        run: |
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v develop -d ./functions build
          docker images --format "table {{.ID}}\t{{.Repository}}\t{{.Tag}}"

      - name: Prune images
        if: always()
        id: prune
        run: |
          docker buildx prune -af

      - name: Start services
        if: success() || failure()
        uses: nick-fields/retry@v3
        id: start
        with:
          timeout_seconds: 1800
          retry_wait_seconds: 100
          max_attempts: 2
          retry_on: any
          command: |
            ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }}  -d ./functions start
            DC_EXIT_CODE=$?
            DOCKER_STATUS_FILE=../docker-status-${GITHUB_RUN_ID:-ghRunId}-$(date '+%Y%m%dT%H%M%S').txt | tee -a $GITHUB_ENV
            docker ps --format {{.Names}},{{.Status}} 2> /dev/null | sort | tee $DOCKER_STATUS_FILE | tee -a $GITHUB_STEP_SUMMARY
            [ $DC_EXIT_CODE = 0 ] || { echo EXIT DC_EXIT_CODE=$DC_EXIT_CODE && exit $DC_EXIT_CODE; }

      - name: Log status
        if: success() || failure()
        run: |
          echo DC_EXIT_CODE=$DC_EXIT_CODE | tee -a $GITHUB_STEP_SUMMARY
          echo RETRY_EXIT_CODE=${{ steps.start.outputs.exit_code }} | tee -a $GITHUB_STEP_SUMMARY
          echo RETRY_OUTCOME=${{ steps.start.outcome }} | tee -a $GITHUB_STEP_SUMMARY
          echo RETRY_TOTAL_ATTEMPTS=${{ steps.start.outputs.total_attempts }} | tee -a $GITHUB_STEP_SUMMARY
          DC_FAIL_COUNT=$(grep -icE "starting|unhealthy" $DOCKER_STATUS_FILE|| true)
          echo DC_FAIL_COUNT=$DC_FAIL_COUNT | tee -a $GITHUB_STEP_SUMMARY

      - name: Logs
        if: success() || failure()
        run: |
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions logs

      - name: Setup HTTP Test Env
        if: success() || failure()
        uses: nick-fields/retry@v3
        id: setupHTTPTestEnv
        with:
          timeout_seconds: 1800
          retry_wait_seconds: 100
          max_attempts: 1
          retry_on: any
          command: |
            ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }}  -d ./functions setuphttptestenv
            DC_EXIT_CODE=$?
            DOCKER_STATUS_FILE=../docker-status-${GITHUB_RUN_ID:-ghRunId}-$(date '+%Y%m%dT%H%M%S').txt | tee -a $GITHUB_ENV
            docker ps --format {{.Names}},{{.Status}} 2> /dev/null | sort | tee $DOCKER_STATUS_FILE | tee -a $GITHUB_STEP_SUMMARY
            [ $DC_EXIT_CODE = 0 ] || { echo EXIT DC_EXIT_CODE=$DC_EXIT_CODE && exit $DC_EXIT_CODE; }

      - name: Get dataset Id
        run: |
          export resDataset=$(docker exec d2e-minerva-postgres-1 psql -h localhost -U postgres -p 5432 -d alp -c "select * from portal.dataset" 2>/dev/null)
          echo "$resDataset"
          export resDatasetDetail=$(docker exec d2e-minerva-postgres-1 psql -h localhost -U postgres -p 5432 -d alp -c "select * from portal.dataset_detail" 2>/dev/null)
          echo "$resDatasetDetail"
          export resTrexDB=$(docker exec d2e-minerva-postgres-1 psql -h localhost -U postgres -p 5432 -d alp -c "select * from trex.db" 2>/dev/null)
          echo "$resTrexDB"
          export DATASET_ID=$(docker exec d2e-minerva-postgres-1 psql -h localhost -U postgres -p 5432 -d alp -t -c "select id from portal.dataset where type = 'omop'" 2>/dev/null | head -1 | xargs)
          echo "DATASET_ID=$DATASET_ID" >> $GITHUB_ENV # Make available to subsequent github actions steps
          # echo "Update database id"
          # docker exec d2e-minerva-postgres-1 psql -h localhost -U postgres -p 5432 -d alp -c "update trex.db set id = 'postgres' where host = 'demodb' and port = 5432 and name = 'postgres' and dialect = 'postgres'"
          # export resTrexDB=$(docker exec d2e-minerva-postgres-1 psql -h localhost -U postgres -p 5432 -d alp -c "select * from trex.db" 2>/dev/null)
          # echo "$resTrexDB"
      - name: Logs
        if: success() || failure()
        run: |
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions logs

      - name: Checkflow
        if: success() || failure()
        uses: nick-fields/retry@v3
        id: checkflow
        with:
          timeout_seconds: 1800
          retry_wait_seconds: 100
          max_attempts: 1
          retry_on: any
          command: |
            ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions checkflow
            DC_EXIT_CODE=$?
            [ $DC_EXIT_CODE = 0 ] || { echo EXIT DC_EXIT_CODE=$DC_EXIT_CODE && exit $DC_EXIT_CODE; }

      - name: Restart d2e services
        if: success() || failure()
        run: |
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions stop
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions -p 41100 start

      - name: Wait for services to be ready to avoid mounting race condition
        if: ${{ steps.file_changes.outputs.ui == 'true' }}
        run: sleep 10

      - name: Check status of docker containers
        run: |
          docker ps -a

      - name: Login to logto and get Bearer token and sub
        run: |
          echo "LOGTO__D2E_APP__CLIENT_ID: ${LOGTO__D2E_APP__CLIENT_ID}"
          # Get sign in page
          response=$(curl -ik "https://localhost:41100/oidc/auth?redirect_uri=https%3A%2F%2Flocalhost%3A41100%2Fd2e%2Fportal%2Flogin-callback&client_id=$LOGTO__D2E_APP__CLIENT_ID&response_type=code&state=lbFDB1hcko&scope=openid%20offline_access%20profile%20email&nonce=Osptnuwqc47w&code_challenge=n6eqz8p8jj1L9Qu7pY2_GrWO7XyaQbWrcs54x9OAnPg&code_challenge_method=S256")
          printf "%s\n" "$response"

          # Extract cookies
          interaction_cookie=$(printf "%s\n" "$response" | grep _interaction= | awk -F'=' '{print $2}' | awk -F'; ' '{print $1}')
          interaction_sig_cookie=$(printf "%s\n" "$response" | grep _interaction.sig= | awk -F'=' '{print $2}' | awk -F'; ' '{print $1}')
          interaction_resume_cookie=$(printf "%s\n" "$response" | grep _interaction_resume= | awk -F'=' '{print $2}' | awk -F'; ' '{print $1}')
          interaction_resume_sig_cookie=$(printf "%s\n" "$response" | grep _interaction_resume.sig= | awk -F'=' '{print $2}' | awk -F'; ' '{print $1}')
          logto_cookie=$(printf "%s\n" "$response" | grep _logto= | awk -F'=' '{print $2}' | awk -F'; ' '{print $1}')

          # Sign in
          response=$(curl -ik --request PUT 'https://localhost:41100/api/interaction' \
              --header 'content-type: application/json' \
              --header 'Referer: https://localhost:41100/sign-in' \
              --header "Cookie: _interaction=$interaction_cookie; _interaction.sig=$interaction_sig_cookie; _logto={\"appId\":\"$LOGTO__D2E_APP__CLIENT_ID\"}" \
              --data '{
              "event": "SignIn",
              "identifier": {
                  "username": "admin",
                  "password": "Updatepassword12345"
              }
          }')
          printf "%s\n" "$response"

          # Submit sign in page
          response=$(curl -ik --request POST 'https://localhost:41100/api/interaction/submit' \
              --header 'accept: application/json' \
              --header 'origin: https://localhost:41100' \
              --header 'referer: https://localhost:41100/sign-in' \
              --header "Cookie: _interaction=$interaction_cookie; _interaction.sig=$interaction_sig_cookie; _logto={\"appId\":\"$LOGTO__D2E_APP__CLIENT_ID\"}")
          printf "%s\n" "$response"

          # Get session
          response=$(curl -ik "https://localhost:41100/oidc/auth/$interaction_cookie" \
              --header 'referer: https://localhost:41100/sign-in' \
              --header "Cookie: _interaction=$interaction_cookie; _interaction.sig=$interaction_sig_cookie; _interaction_resume=$interaction_resume_cookie; _interaction_resume.sig=$interaction_resume_sig_cookie; _logto={\"appId\":\"$LOGTO__D2E_APP__CLIENT_ID\"}")
          printf "%s\n" "$response"

          interaction_cookie=$(printf "%s\n" "$response" | grep _interaction= | awk -F'=' '{print $2}' | awk -F'; ' '{print $1}')
          interaction_sig_cookie=$(printf "%s\n" "$response" | grep _interaction.sig= | awk -F'=' '{print $2}' | awk -F'; ' '{print $1}')
          interaction_resume_cookie=$(printf "%s\n" "$response" | grep _interaction_resume= | awk -F'=' '{print $2}' | awk -F'; ' '{print $1}')
          interaction_resume_sig_cookie=$(printf "%s\n" "$response" | grep _interaction_resume.sig= | awk -F'=' '{print $2}' | awk -F'; ' '{print $1}')
          logto_cookie=$(printf "%s\n" "$response" | grep _logto= | awk -F'=' '{print $2}' | awk -F'; ' '{print $1}')
          session_cookie=$(printf "%s\n" "$response" | grep _session= | awk -F'=' '{print $2}' | awk -F'; ' '{print $1}')
          session_sig_cookie=$(printf "%s\n" "$response" | grep _session.sig= | awk -F'=' '{print $2}' | awk -F'; ' '{print $1}')

          # Submit consent page
          response=$(curl -ik 'https://localhost:41100/consent' \
              --header 'accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7' \
              --header 'referer: https://localhost:41100/sign-in' \
              --header "Cookie: _interaction=$interaction_cookie; _interaction.sig=$interaction_sig_cookie; _interaction_resume=$interaction_resume_cookie; _interaction_resume.sig=$interaction_resume_sig_cookie; _session=$session_cookie; _session.sig=$session_sig_cookie; _logto={\"appId\":\"$LOGTO__D2E_APP__CLIENT_ID\"}")
          printf "%s\n" "$response"

          # Get authorization code
          response=$(curl -ik "https://localhost:41100/oidc/auth/$interaction_cookie" \
              --header 'accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7' \
              --header 'referer: https://localhost:41100/sign-in' \
              --header "Cookie: _interaction=$interaction_cookie; _interaction.sig=$interaction_sig_cookie; _interaction_resume=$interaction_resume_cookie; _interaction_resume.sig=$interaction_resume_sig_cookie; _session=$session_cookie; _session.sig=$session_sig_cookie; _logto={\"appId\":\"$LOGTO__D2E_APP__CLIENT_ID\"}")
          printf "%s\n" "$response"

          authorization_code=$(printf "%s\n" "$response" | sed -n 's/.*code=\([^&]*\).*/\1/p' | head -n 1)

          # Complete login
          response=$(curl -ik "https://localhost:41100/d2e/portal/login-callback?code=$authorization_code&state=lbFDB1hcko&iss=https%3A%2F%2Flocalhost%3A41100%2Foidc" \
              --header 'accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7' \
              --header 'referer: https://localhost:41100/sign-in' \
              --header "Cookie: _interaction=$interaction_cookie; _interaction.sig=$interaction_sig_cookie; _interaction_resume=$interaction_resume_cookie; _interaction_resume.sig=$interaction_resume_sig_cookie; _session=$session_cookie; _session.sig=$session_sig_cookie; _logto={\"appId\":\"$LOGTO__D2E_APP__CLIENT_ID\"}")
          printf "%s\n" "$response"

          # Get Bearer token
          response=$(curl -ik 'https://localhost:41100/d2e/oauth/token' \
              --header 'accept: application/json, text/javascript, */*; q=0.01' \
              --header 'content-type: application/x-www-form-urlencoded' \
              --header "Cookie: _interaction=$interaction_cookie; _interaction.sig=$interaction_sig_cookie; _interaction_resume=$interaction_resume_cookie; _interaction_resume.sig=$interaction_resume_sig_cookie; _session=$session_cookie; _session.sig=$session_sig_cookie; _logto={\"appId\":\"$LOGTO__D2E_APP__CLIENT_ID\"}" \
              --header 'origin: https://localhost:41100' \
              --header 'referer: https://localhost:41100/d2e/portal/login-callback?code=2sxkx6uCahwOfKo1cwzLaAq5MfdBJrMcqCLNHvOTXFv&state=odSrnZhVyE&iss=https%3A%2F%2Flocalhost%3A41100%2Foidc' \
              --data-urlencode 'grant_type=authorization_code' \
              --data-urlencode "client_id=$LOGTO__D2E_APP__CLIENT_ID" \
              --data-urlencode 'redirect_uri=https://localhost:41100/d2e/portal/login-callback' \
              --data-urlencode "code=$authorization_code" \
              --data-urlencode 'code_verifier=kqVLhCyXRJ3Y9mXie6F9d1FW8AUbTUzIuJiqUf1SM9I')
          printf "%s\n" "$response"

          export BEARER_TOKEN=$(echo "$response" | grep -o '"access_token":"[^"]*"' | sed 's/"access_token":"\([^"]*\)"/\1/')
          echo "BEARER_TOKEN=$BEARER_TOKEN" >> $GITHUB_ENV # Make available to subsequent github actions steps

          echo "BEARER TOKEN:"
          echo $BEARER_TOKEN
          # Get the idp sub

          decode_base64_url() {
              local len=$((${#1} % 4))
              local result="$1"
              if [ $len -eq 2 ]; then
                  result="$1"'=='
              elif [ $len -eq 3 ]; then
                  result="$1"'='
              fi
              echo "$result" | tr '_-' '/+' | openssl enc -d -base64
          }

          decode_jwt() {
              decode_base64_url $(echo -n $2 | cut -d "." -f $1)
          }

          DECODED_TOKEN="$(decode_jwt 2 $BEARER_TOKEN)"
          echo "DECODED TOKEN:"
          echo $DECODED_TOKEN
          export IDP_SUB=$(echo $(echo $DECODED_TOKEN | grep -o '"sub":"[^"]*"' | awk -F':' '{print $2}' | tr -d '"'))
          echo "IDP_SUB=$IDP_SUB" >> $GITHUB_ENV # Make available to subsequent github actions steps
          echo "IDP SUB:"
          echo $IDP_SUB

          # Endpoint to update user management with idp user id
          response=$(curl -ik 'https://localhost:41100/d2e/usermgmt/api/user-group/list' \
              -H 'accept: application/json, text/plain, */*' \
              -H "authorization: Bearer $BEARER_TOKEN" \
              -H 'content-type: application/json' \
              -H 'origin: https://localhost:41100' \
              -H 'referer: https://localhost:41100/d2e/portal/no-access' \
              --data-raw "{\"userId\":\"$IDP_SUB\"}")
          printf "%s\n" "$response"
          USER_MGMT_ID=$(printf "%s\n" "$response" | grep -o '"userId":"[^"]*"' | awk -F':' '{print $2}' | tr -d '"')
          echo "USER_MGMT_ID=$USER_MGMT_ID" >> $GITHUB_ENV # Make available to subsequent github actions steps
          echo "USER_MGMT_ID:"
          echo $USER_MGMT_ID

      - name: Check status of docker containers
        run: |
          docker ps -a

      - name: Check PG DB connection
        run: |
          PGPASSWORD=$(echo $(docker exec d2e-trex printenv DEMO__DB_PASSWORD))
          sudo apt install -y postgresql-client
          pg_isready -d ${PGDATABASE} -h ${PGHOST} -p ${PGPORT} -U ${PGUSER}
          psql -h ${PGHOST} -p ${PGPORT} -U ${PGUSER} -d ${PGDATABASE}

      - name: Setup Test DB
        run: |
          PGPASSWORD=$(echo $(docker exec d2e-trex printenv DEMO__DB_PASSWORD))
          yarn --prefer-offline
          yarn inittestdb-pg

      - name: Install dependencies in backend integration tests
        run: |
          cd ./tests/backend_integration_tests/pg
          yarn

      - name: Set env vars for HTTP tests
        run: |
          echo "PGPASSWORD=$(echo $(docker exec d2e-trex printenv DEMO__DB_PASSWORD))" >> $GITHUB_ENV
          echo "PGPORT=${PGPORT}" >> $GITHUB_ENV
          echo "PGUSER=${PGUSER}" >> $GITHUB_ENV
          echo "PGHOST=${PGHOST}" >> $GITHUB_ENV
          echo "TESTSCHEMA=${TESTSCHEMA}" >> $GITHUB_ENV
          echo "HDIPORT=${PGPORT}" >> $GITHUB_ENV
          echo "HDIPW=$(echo $(docker exec d2e-trex printenv DEMO__DB_PASSWORD))" >> $GITHUB_ENV
          echo "HDIUSER=${PGUSER}" >> $GITHUB_ENV
          echo "HANASERVER=${PGHOST}" >> $GITHUB_ENV
          echo "PGDATABASE=${PGDATABASE}" >> $GITHUB_ENV
          echo "isHttpTestRun=${isHttpTestRun}" >> $GITHUB_ENV
          echo "isTestEnv=${isTestEnv:-false}" >> $GITHUB_ENV
          echo "HTTPTEST_DB_DIALECT=${HTTPTEST_DB_DIALECT:-duckdb}" >> $GITHUB_ENV

      - name: Run HTTP tests
        working-directory: ./tests/backend_integration_tests/pg
        run: |
            echo "HDIPORT: ${HDIPORT}"
            echo "HDIPW: ${HDIPW}"
            echo "HDIUSER: ${HDIUSER}"
            echo "HANASERVER: ${HANASERVER}"
            echo "PGDATABASE: ${PGDATABASE}"
            echo "isHttpTestRun: ${isHttpTestRun}"
            echo "isTestEnv: ${isTestEnv:-false}"
            echo "TESTSCHEMA: ${TESTSCHEMA}"
            echo "HTTPTEST_DB_DIALECT: ${HTTPTEST_DB_DIALECT}"
            yarn test-specs --test_schema_name=$TESTSCHEMA

      - name: Logs
        if: success() || failure()
        run: |
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions logs

      - name: Stop d2e services
        if: success() || failure()
        id: stop
        run: |
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions stop

      - name: Prune system
        if: always()
        id: prune_system
        run: |
          docker system prune -af
