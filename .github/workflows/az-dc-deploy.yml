name: d2e DC Deploy AzureDev
run-name: 'OHDSI/d2e'

on:
  push:
    branches:
      - develop
  
jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to dev
    steps:
      - uses: actions/checkout@v4.1.1 
      - name: deploy
        env:
          GHA_DEPLOY_TOKEN: ${{ secrets.GHA_DEPLOY_TOKEN }}
        run: |
            curl -L -X POST -H "Accept: application/vnd.github+json" -H "Authorization: Bearer $GHA_DEPLOY_TOKEN" -H "X-GitHub-Api-Version: 2022-11-28" https://api.github.com/repos/data2evidence/d2e-deploy/dispatches -d '{"event_type":"deploy_dev","client_payload":{"unit":false,"integration":true}}'
      
