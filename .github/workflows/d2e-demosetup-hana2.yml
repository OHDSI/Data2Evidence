name: E2E Tests HANA 2
permissions:
  contents: read

on:
  pull_request:
    types: [opened, ready_for_review, reopened, synchronize]
  merge_group:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  pick_runner:
    runs-on: ubuntu-latest
    if: (github.ref_name == 'develop' || contains(github.ref_name, 'release/') || github.event_name == 'workflow_dispatch' || github.event_name == 'merge_group') || ( (contains(github.base_ref, 'release/') || github.event_name == 'pull_request') && !github.event.pull_request.draft ) # Should run if branch is develop/release/workflow_dispatch and doesnt have a PR
    outputs:
      random_runner: ${{ steps.shuffle.outputs.random_runner }}
    steps:
      - id: shuffle
        run: echo "random_runner=$(shuf -e ubuntu-22.04 ubuntu-24.04 | head -n 1)" >> "$GITHUB_OUTPUT"

  check_file_changes:
    runs-on: ubuntu-latest
    if: (github.ref_name == 'develop' || contains(github.ref_name, 'release/') || github.event_name == 'workflow_dispatch' || github.event_name == 'merge_group') || ( (contains(github.base_ref, 'release/') || github.event_name == 'pull_request') && !github.event.pull_request.draft ) # Should run if branch is develop/release/workflow_dispatch and doesnt have a PR
    outputs:
      changes: ${{ steps.file_changes.outputs.src }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dorny/paths-filter@v3
        id: file_changes
        with:
          initial-fetch-depth: 1
          filters: |
            src:
              - "functions/_shared/alp-libs/nodejs/**"
              - "functions/analytics-svc/**"
              - "functions/bookmark-svc/**"
              - "functions/cdw-svc/**"
              - "functions/mri-pa-config/**"
              - "functions/mri-pg-config/**"
              - "functions/query-gen-svc/**"
              - "services/mri-db/**"
              - "services/alp-logto/**"
              - "services/alp-pg-management/**"
              - "package.json"
              - "docker-compose.yml"
              - "scripts/**"
              - ".github/workflows/functions-http-tests-hana.yml"

  run-e2e-hana-tests:
    needs: [pick_runner, check_file_changes]
    if: (github.ref_name == 'develop' || contains(github.ref_name, 'release/') || contains(github.base_ref, 'release/') || github.event_name == 'workflow_dispatch' || github.event_name == 'merge_group') || ( github.event_name == 'pull_request' && !github.event.pull_request.draft && needs.check_file_changes.outputs.changes == 'true' ) # Should run if branch is develop/release/workflow_dispatch and doesnt have a PR
    runs-on: ${{ needs.pick_runner.outputs.random_runner }}
    timeout-minutes: 80
    env:
      TESTSCHEMA: E2E_TEST_SCHEMA
      isTestEnv: "true"
      isHttpTestRun: "true"
      HANASERVER: localhost # az-hn-db/SG_FQDN
      HANASERVER_INT: hana
      HDIPORT: 39041 # az-hn-db/DB Port
      HDIPW: TestPW1234 # az-hn-db/Admin password
      HDIUSER: SYSTEM # az-hn-db/Admin user
      TESTPORT: 39041 # az-hn-db/DB Port
      TESTSYSTEMPW: TestPW1234 # az-hn-db/Admin password
      PROJECT_NAME: alp
      CADDY__CONFIG: ./deploy/caddy-config
      ENV_TYPE: local
      DOTENV_FILE: .env.local
      D2E_RESOURCE_LIMIT: 1.0
      HTTPTEST_DB_DIALECT: "hana"
      VERSION: develop

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: true

          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: false

      - name: Print env vars
        run: |
          echo "DOCKER_TAG_NAME: ${DOCKER_TAG_NAME}"
          echo "HDIPORT: ${HDIPORT}"
          echo "HDIPW: ${HDIPW}"
          echo "HDIUSER: ${HDIUSER}"
          echo "HANASERVER: ${HANASERVER}"
          echo "isHttpTestRun: ${isHttpTestRun}"
          echo "isTestEnv: ${isTestEnv:-false}"
          echo "TESTSCHEMA: ${TESTSCHEMA}"

      - uses: actions/setup-node@v4
        with:
          node-version: "18.20.4"

      - name: npm install
        if: success() || failure()
        run: |
          npm install

      - name: Initialise d2e
        if: success() || failure()
        id: init
        run: |
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v develop -n .env init
        env:
          init_choice: y
      - name: Initialise HANA
        if: success() || failure()
        id: inithana
        run: |
          timeout 5m bash -c "HANAPW=${HDIPW} ACCEPT_SAP_LICENSE=true node ./scripts/dist/cli.js -e -v develop --env-file .env.local --hana inithana" || echo "HANA initialization timed out or failed, continuing..."

      - uses: dorny/paths-filter@v3
        id: flow_file_changes
        with:
          initial-fetch-depth: 1
          filters: |
            src:
              - "flows/base/**"

      - name: Build Flow base docker image
        if: steps.flow_file_changes.outputs.src == 'true'
        id: build_flow_base_image
        run: |
          docker build --build-arg GIT_COMMIT_ARG=${{ github.sha }} --build-arg BUILD_TYPE=OSS --build-arg GITHUB_PAT=${{ secrets.GITHUB_TOKEN }} --file ./flows/base/Dockerfile --platform linux/amd64 --attest type=provenance,disabled=true --tag ghcr.io/ohdsi/d2e/flow-base:develop ./flows

      - name: Build docker images
        if: success() || failure()
        id: pull
        run: |
          DOTENV_FILE=.env ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v develop --hana -d ./functions build
          docker images --format "table {{.ID}}\t{{.Repository}}\t{{.Tag}}"

      - name: Prune images
        if: always()
        id: prune
        run: |
          docker buildx prune -af
      - name: Manipulate configuration
        run: |
          yq -i '.networks.alp.external=true' docker-compose.yml
          yq -i '.services.trex.command="npm run start"' docker-compose-local.yml # Display logs

      - name: Create network for external to use
        run: |
          docker network inspect alp > /dev/null || docker network create alp

      - name: Start services
        if: success() || failure()
        uses: nick-fields/retry@v3
        id: start
        with:
          timeout_seconds: 1800
          retry_wait_seconds: 100
          max_attempts: 2
          retry_on: any
          command: |
            DOTENV_FILE=.env ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions --hana start
            DC_EXIT_CODE=$?
            DOCKER_STATUS_FILE=../docker-status-${GITHUB_RUN_ID:-ghRunId}-$(date '+%Y%m%dT%H%M%S').txt
            echo "DOCKER_STATUS_FILE=$DOCKER_STATUS_FILE" >> $GITHUB_ENV
            docker ps --format {{.Names}},{{.Status}} 2> /dev/null | sort | tee $DOCKER_STATUS_FILE | tee -a $GITHUB_STEP_SUMMARY
            [ $DC_EXIT_CODE = 0 ] || { echo EXIT DC_EXIT_CODE=$DC_EXIT_CODE && exit $DC_EXIT_CODE; }

      - name: Check status of docker containers
        run: |
          docker ps -a

      - name: Log status
        if: success() || failure()
        run: |
          echo DC_EXIT_CODE=$DC_EXIT_CODE | tee -a $GITHUB_STEP_SUMMARY
          echo RETRY_EXIT_CODE=${{ steps.start.outputs.exit_code }} | tee -a $GITHUB_STEP_SUMMARY
          echo RETRY_OUTCOME=${{ steps.start.outcome }} | tee -a $GITHUB_STEP_SUMMARY
          echo RETRY_TOTAL_ATTEMPTS=${{ steps.start.outputs.total_attempts }} | tee -a $GITHUB_STEP_SUMMARY
          DC_FAIL_COUNT=$(grep -icE "starting|unhealthy" $DOCKER_STATUS_FILE || true)
          echo DC_FAIL_COUNT=$DC_FAIL_COUNT | tee -a $GITHUB_STEP_SUMMARY

      - name: Logs
        if: success() || failure()
        run: |
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions logs

      - name: Setupdemohana
        if: success() || failure()
        uses: nick-fields/retry@v3
        id: setupdemo
        with:
          timeout_seconds: 1800
          retry_wait_seconds: 100
          max_attempts: 1
          retry_on: any
          command: |
            ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }}  -d ./functions setupdemohana
            DC_EXIT_CODE=$?
            DOCKER_STATUS_FILE=../docker-status-${GITHUB_RUN_ID:-ghRunId}-$(date '+%Y%m%dT%H%M%S').txt | tee -a $GITHUB_ENV
            docker ps --format {{.Names}},{{.Status}} 2> /dev/null | sort | tee $DOCKER_STATUS_FILE | tee -a $GITHUB_STEP_SUMMARY
            [ $DC_EXIT_CODE = 0 ] || { echo EXIT DC_EXIT_CODE=$DC_EXIT_CODE && exit $DC_EXIT_CODE; }

      - name: View dataset details
        run: |
          export resDataset=$(docker exec alp-minerva-postgres-1 psql -h localhost -U postgres -p 5432 -d alp -c "select * from portal.dataset" 2>/dev/null)
          echo "$resDataset"
          echo "Update schema name to E2E_TEST_SCHEMA..."
          export resDataset=$(docker exec alp-minerva-postgres-1 psql -h localhost -U postgres -p 5432 -d alp -c "update portal.dataset set schema_name = 'E2E_TEST_SCHEMA'" 2>/dev/null)
          echo "$resDataset"
          export resDataset=$(docker exec alp-minerva-postgres-1 psql -h localhost -U postgres -p 5432 -d alp -c "select * from portal.dataset" 2>/dev/null)
          echo "$resDataset"
          export resDatasetDetail=$(docker exec alp-minerva-postgres-1 psql -h localhost -U postgres -p 5432 -d alp -c "select * from portal.dataset_detail" 2>/dev/null)
          echo "$resDatasetDetail"
          export resTrexDB=$(docker exec alp-minerva-postgres-1 psql -h localhost -U postgres -p 5432 -d alp -c "select * from trex.db" 2>/dev/null)
          echo "$resTrexDB"

      - name: Setup Test DB
        run: |
          yarn --prefer-offline
          yarn init-e2e-testdb-hana

      - name: Logs
        if: success() || failure()
        run: |
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions logs

      # - name: Checkflow
        # if: success() || failure()
        # uses: nick-fields/retry@v3
        # id: checkflow
        # with:
        #   timeout_seconds: 1800
        #   retry_wait_seconds: 100
        #   max_attempts: 1
        #   retry_on: any
        #   command: |
        #     ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions checkflow
        #     DC_EXIT_CODE=$?
        #     [ $DC_EXIT_CODE = 0 ] || { echo EXIT DC_EXIT_CODE=$DC_EXIT_CODE && exit $DC_EXIT_CODE; }

      - name: UI Setup bun
        # if: ${{ steps.file_changes.outputs.ui == 'true' }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.23

      - name: UI Build
        # if: ${{ steps.file_changes.outputs.ui == 'true' }}
        working-directory: ./ui
        env:
          CI: false
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl file git
          bun install
          bun build-all
          UI_BUILD_EXIT_CODE=$?
          [ $UI_BUILD_EXIT_CODE = 0 ] || { echo EXIT UI_BUILD_EXIT_CODE=$UI_BUILD_EXIT_CODE && exit $UI_BUILD_EXIT_CODE; }

      - name: UI docker-compose-local
        # if: ${{ steps.file_changes.outputs.ui == 'true' }}
        run: |
          sed -i 's|# - ./ui/resources:/usr/src/local-resources|- ./ui/resources:/usr/src/local-resources|' docker-compose-local.yml
      - name: Flow base docker-compose-local
        if: ${{ steps.file_changes.outputs.flow_package_json == 'true' }}
        run: |
          sed -i 's|# - ./flows/base/package.json:/usr/src/plugins/d2e-flows/package.json|- ./flows/base/package.json:/usr/src/plugins/d2e-flows/package.json|' docker-compose-local.yml

      - name: Restart d2e services
        if: success() || failure()
        run: |
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions stop
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions start

      - name: Wait for d2e-ui plugin to be installed
        # if: ${{ steps.file_changes.outputs.ui == 'true' }}
        run: |
          echo "Waiting for d2e-ui plugin to be installed..."
          max_attempts=60
          attempt=0
          start_time=$(date +%s)
          while [ $attempt -lt $max_attempts ]; do
            # Check if plugin resources directory exists and has files
            if docker exec d2e-trex ls /usr/src/data/plugins/@data2evidence/d2e-ui/resources/portal >/dev/null 2>&1; then
              end_time=$(date +%s)
              elapsed=$((end_time - start_time))
              echo "d2e-ui plugin is ready (took ${elapsed}s)"
              break
            fi
            attempt=$((attempt + 1))
            echo "  Attempt $attempt/$max_attempts: waiting..."
            sleep 2
          done
          if [ $attempt -eq $max_attempts ]; then
            echo "Timeout waiting for d2e-ui plugin to be installed"
            exit 1
          fi

      - name: UI Mounting build
        # if: ${{ steps.file_changes.outputs.ui == 'true' }}
        run: |
          docker exec d2e-trex sh -c "rm -rf /usr/src/data/plugins/\@data2evidence/d2e-ui/resources"
          docker exec d2e-trex sh -c "cp -r /usr/src/local-resources /usr/src/data/plugins/\@data2evidence/d2e-ui/resources"

      - name: Build e2e Docker image
        run: |
          cd ./tests/e2e/hana
          docker build -t d2e-e2e .

      - name: Verify app is reachable
        run: |
          curl -k -s -o /dev/null -w "%{http_code}" https://localhost:443/d2e/portal || echo "App not reachable"
          curl -k -I https://localhost:443/d2e/portal || true

      - name: Disable IPv6 to prevent ERR_NETWORK_CHANGED
        run: sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1

      - name: e2e tests
        run: |
          cd ./tests/e2e/hana
          docker run --rm \
            --network=host \
            --ipc=host \
            -v "$(pwd)/test-results:/work/test-results" \
            -v "$(pwd)/ctrf:/work/ctrf" \
            -e D2E_BASE_URL=https://localhost:443 \
            -e CI=true \
            -e GITHUB_ACTIONS=true \
            d2e-e2e npm test

      - name: Upload Error Context
        if: always() # Always run, even if the previous step fails
        uses: actions/upload-artifact@v4
        with:
          name: error-context
          path: tests/e2e/hana/test-results/**/*

      - name: Logs
        if: success() || failure()
        run: |
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions logs

      - name: Publish Test Report
        if: always()
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: "./tests/e2e/hana/ctrf/*.json"
          file-report: true

      - name: Stop d2e services
        if: success() || failure()
        id: stop
        run: |
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions stop

      - name: Prune system
        if: always()
        id: prune_system
        run: |
          docker system prune -af
