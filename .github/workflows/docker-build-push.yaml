    with:
      attempt: "2"
      runner: ${{ needs.setup.outputs.random_runner }}
      run_tag: ${{ needs.setup.outputs.run_tag }}
      changes_ui: ${{ needs.setup.outputs.changes_ui }}
      reg_url: ghcr.io/ohdsi
      prepull_flow_images: "flow-base flow-i2b2 flow-data-management"
    secrets: inherit

