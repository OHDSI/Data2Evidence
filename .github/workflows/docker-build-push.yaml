  test_http_hana:
    needs: [setup, build_images, build_plugins]
    if: |
      needs.setup.outputs.is_publish_push == 'true' ||
      contains(github.base_ref, 'release/') ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'merge_group' ||
      (github.event_name == 'pull_request' && needs.setup.outputs.changes_http_tests == 'true')
    runs-on: ${{ needs.setup.outputs.random_runner }}
    timeout-minutes: 80
    env:
      DOCKER_TAG_NAME: ${{ needs.setup.outputs.run_tag }}
      PLUGINS_IMAGE_TAG: ${{ needs.setup.outputs.run_tag }}
      TESTSCHEMA: HTTP_${{ github.run_id }}
      isTestEnv: "true"
      isHttpTestRun: "true"
      HANASERVER: localhost
      HANASERVER_INT: hana
      HDIPORT: 39041
      HDIPW: TestPW1234
      HDIUSER: SYSTEM
      TESTPORT: 39041
      TESTSYSTEMPW: TestPW1234
      PROJECT_NAME: alp
      CADDY__CONFIG: ./deploy/caddy-config
      ENV_TYPE: local
      DOTENV_FILE: .env.local
      D2E_RESOURCE_LIMIT: 1.0
      HTTPTEST_DB_DIALECT: "hana"
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: false

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Print env vars
        run: |
          echo "DOCKER_TAG_NAME: ${DOCKER_TAG_NAME}"
          echo "HDIPORT: ${HDIPORT}"
          echo "HDIPW: ${HDIPW}"
          echo "HDIUSER: ${HDIUSER}"
          echo "HANASERVER: ${HANASERVER}"
          echo "isHttpTestRun: ${isHttpTestRun}"
          echo "isTestEnv: ${isTestEnv:-false}"
          echo "TESTSCHEMA: ${TESTSCHEMA}"

      - uses: actions/setup-node@v4
        with:
          node-version: "18.20.4"

      - name: npm install
        if: success() || failure()
        run: npm install

      - name: Initialise d2e
        if: success() || failure()
        run: |
          init_choice=y node ./scripts/dist/cli.js -e -v develop --env-file .env.local -p 41100 -d ./plugins/functions init

      - name: Initialise HANA
        if: success() || failure()
        run: |
          timeout 5m bash -c "HANAPW=${HDIPW} ACCEPT_SAP_LICENSE=true node ./scripts/dist/cli.js -e -v develop --env-file .env.local --hana inithana" || echo "HANA initialization timed out or failed, continuing..."

      - name: Remove empty lines, replace ; within the query with a place holder
        run: |
          sed -i -r '/^\s*$/d' tests/backend_integration_tests/build/sql/httptest-ddl.sql
          sed -i -e 's/;,.:-/PLACE_HOLDER_STR/g' tests/backend_integration_tests/build/sql/httptest-ddl.sql
          grep LOGTO__D2E_APP__CLIENT_ID $DOTENV_FILE | sed -e "s/'//g" >> $GITHUB_ENV
          echo >> $DOTENV_FILE
          echo "NODE_ENV=production" >> $DOTENV_FILE

      - name: Pull docker compose images
        run: |
