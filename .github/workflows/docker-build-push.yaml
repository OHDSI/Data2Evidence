        run: |
          response=$(curl -ik 'https://localhost:41100/d2e/oauth/token' \
              --header 'accept: application/json, text/javascript, */*; q=0.01' \
              --header 'content-type: application/x-www-form-urlencoded' \
              --data-urlencode 'grant_type=refresh_token' \
              --data-urlencode "client_id=$LOGTO__D2E_APP__CLIENT_ID" \
              --data-urlencode "refresh_token=$REFRESH_TOKEN")
          printf "%s\n" "$response"

          export BEARER_TOKEN=$(echo "$response" | grep -o '"access_token":"[^"]*"' | sed 's/"access_token":"\([^"]*\)"/\1/')
          echo "BEARER_TOKEN=$BEARER_TOKEN" >> $GITHUB_ENV

          export REFRESH_TOKEN=$(echo "$response" | grep -o '"refresh_token":"[^"]*"' | sed 's/"refresh_token":"\([^"]*\)"/\1/')
          echo "REFRESH_TOKEN=$REFRESH_TOKEN" >> $GITHUB_ENV

      - name: Install dependencies in backend integration tests
        run: |
          cd ./tests/backend_integration_tests/hana
          yarn

      - name: Run HTTP tests
        working-directory: ./tests/backend_integration_tests/hana
        run: yarn test-specs --test_schema_name=$TESTSCHEMA

      - name: print logs for alp-dataflow-gen-1
        if: ${{ always() || cancelled() || failure() }}
        run: docker logs alp-dataflow-gen-1 -t
      - name: print logs for alp-dataflow-gen-worker
        if: ${{ always() || cancelled() || failure() }}
        run: docker logs alp-dataflow-gen-worker -t
      - name: print logs for alp-logto-1
        if: ${{ always() || cancelled() || failure() }}
        run: docker logs alp-logto-1 -t
      - name: print logs for alp-minerva-postgres-1
        if: ${{ always() || cancelled() || failure() }}
        run: docker logs alp-minerva-postgres-1 -t
      - name: print logs for alp-supabase-storage-1
        if: ${{ always() || cancelled() || failure() }}
        run: docker logs alp-supabase-storage-1 -t
      - name: print logs for trex
        if: ${{ always() || cancelled() || failure() }}
        run: docker logs alp-trex -t
      - name: print logs for alp-minerva-pg-mgmt-init-1
        if: ${{ always() || cancelled() || failure() }}
        run: docker logs alp-minerva-pg-mgmt-init-1 -t
      - name: print logs for alp-logto-post-init
        if: ${{ always() || cancelled() || failure() }}
        run: docker logs alp-logto-post-init-1 -t
      - name: print logs for hana
        if: ${{ always() || cancelled() || failure() }}
        run: docker logs hana -t

      - name: Remove Test DB
        if: ${{ always() || cancelled() || failure() }}
        run: yarn removetestdb-hana

      - name: Prune system
        if: always()
        run: docker system prune -af

  promote:
    needs: [setup, build_images]
    if: |
      always() &&
      needs.build_images.result == 'success' &&
      needs.setup.outputs.is_publish_push == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      RUN_TAG: ${{ needs.setup.outputs.run_tag }}
      CANONICAL_TAG: ${{ needs.setup.outputs.canonical_tag }}
    strategy:
      fail-fast: false
      matrix:
        image:
          - d2e/flow-base
          - d2e/flow-i2b2
          - d2e/flow-search-embedding
          - d2e/flow-data-management
          - d2e/flow-loyalty-score
          - d2e/flow-hades
          - d2e/flow-data-transformation
          - d2e-pg-mgmt-init
          - d2e-logto
          - d2e-logto-post-init
          - d2e-enterprise-gateway
          - d2e-r-ohdsi-kernel
          - d2e-trex
          - d2e-dataflow-gen-worker
          - d2e-supabase-storage
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-tag run image as canonical
        run: |
          SRC=${REG_URL}/${{ matrix.image }}:${RUN_TAG}
          DST=${REG_URL}/${{ matrix.image }}:${CANONICAL_TAG}
          if [[ -z "$CANONICAL_TAG" ]]; then
            echo "CANONICAL_TAG empty; nothing to promote."
            exit 0
          fi
          if docker manifest inspect "$SRC" >/dev/null 2>&1; then
            docker buildx imagetools create -t "$DST" "$SRC"
          else
            echo "Source manifest $SRC not present (likely build_disable=true); skipping promotion."
          fi

      - name: Delete untagged versions
        uses: actions/delete-package-versions@v5
        continue-on-error: true
        with:
          package-name: ${{ matrix.image }}
          package-type: container
          min-versions-to-keep: 3
          delete-only-untagged-versions: "true"

  cleanup_pr_tags:
    needs: [setup, build_images, test_demosetup_dev, test_demosetup_hana, test_http_duckdb, test_http_hana]
    if: always() && needs.setup.outputs.is_pr_or_mg == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      RUN_TAG: ${{ needs.setup.outputs.run_tag }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        image:
          - d2e/flow-base
          - d2e/flow-i2b2
          - d2e/flow-search-embedding
          - d2e/flow-data-management
          - d2e/flow-loyalty-score
          - d2e/flow-hades
          - d2e/flow-data-transformation
          - d2e-pg-mgmt-init
          - d2e-logto
          - d2e-logto-post-init
          - d2e-enterprise-gateway
          - d2e-r-ohdsi-kernel
          - d2e-trex
          - d2e-dataflow-gen-worker
          - d2e-supabase-storage
    steps:
      - name: Delete PR-scoped image version
        continue-on-error: true
        run: |
          PKG_NAME="${{ matrix.image }}"
          PKG_ENC=$(echo "$PKG_NAME" | sed 's|/|%2F|g')
          OWNER=ohdsi

          versions=$(gh api -H "Accept: application/vnd.github+json" \
            "/orgs/${OWNER}/packages/container/${PKG_ENC}/versions?per_page=100" \
            --jq ".[] | select(.metadata.container.tags[]? == \"${RUN_TAG}\") | .id" || true)

          if [ -z "$versions" ]; then
            echo "No version found with tag ${RUN_TAG} for ${PKG_NAME}"
            exit 0
          fi

          for vid in $versions; do
            echo "Deleting ${PKG_NAME} version ${vid} (tag ${RUN_TAG})"
            gh api -X DELETE -H "Accept: application/vnd.github+json" \
              "/orgs/${OWNER}/packages/container/${PKG_ENC}/versions/${vid}" || true
          done

  cleanup_e2e_tag:
    needs: [setup, build_e2e_image, test_demosetup_dev]
    if: always() && needs.build_e2e_image.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      RUN_TAG: ${{ needs.setup.outputs.run_tag }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Delete d2e-e2e image version
        continue-on-error: true
        run: |
          PKG_NAME=d2e-e2e
          OWNER=ohdsi

          versions=$(gh api -H "Accept: application/vnd.github+json" \
            "/orgs/${OWNER}/packages/container/${PKG_NAME}/versions?per_page=100" \
            --jq ".[] | select(.metadata.container.tags[]? == \"${RUN_TAG}\") | .id" || true)

          if [ -z "$versions" ]; then
            echo "No version found with tag ${RUN_TAG} for ${PKG_NAME}"
            exit 0
          fi

          for vid in $versions; do
            echo "Deleting ${PKG_NAME} version ${vid} (tag ${RUN_TAG})"
            gh api -X DELETE -H "Accept: application/vnd.github+json" \
              "/orgs/${OWNER}/packages/container/${PKG_NAME}/versions/${vid}" || true
          done

  docker-success:
    needs: [build_images, build_plugins, build_e2e_image, test_demosetup_dev, test_demosetup_hana, test_http_duckdb, test_http_hana]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check upstream job results
        env:
          R_BUILD_IMAGES: ${{ needs.build_images.result }}
          R_BUILD_PLUGINS: ${{ needs.build_plugins.result }}
          R_BUILD_E2E: ${{ needs.build_e2e_image.result }}
          R_DEMO_DEV: ${{ needs.test_demosetup_dev.result }}
          R_DEMO_HANA: ${{ needs.test_demosetup_hana.result }}
          R_HTTP_DUCKDB: ${{ needs.test_http_duckdb.result }}
          R_HTTP_HANA: ${{ needs.test_http_hana.result }}
        run: |
          fail=0
          for r in "$R_BUILD_IMAGES" "$R_BUILD_PLUGINS" "$R_BUILD_E2E" "$R_DEMO_DEV" "$R_DEMO_HANA" "$R_HTTP_DUCKDB" "$R_HTTP_HANA"; do
            case "$r" in
              success|skipped) ;;
              *) fail=1 ;;
            esac
          done
          exit $fail
