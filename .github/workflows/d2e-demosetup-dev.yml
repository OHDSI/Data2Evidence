name: d2e/demosetup-dev

permissions:
  contents: read

on:
  workflow_dispatch: # Allow manual triggering
  pull_request:
    types: [opened, ready_for_review, reopened, synchronize]
  merge_group:
  push:
    branches:
      - develop

env:
  VERSION: develop
  PLUGINS_SEED: '["d2e-flows", "d2e-ui", "d2e-atlas", "data-transformation-flow", "hades-flow", "trex-hana", "trex-pgwire", "d2e-fhir-server", "i2b2-flow", "data-management-flow"]'

jobs:
  demosetup:
    runs-on: ubuntu-24.04
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: true

          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Increase swapfile to 15G
        run: |
          sudo swapoff -a
          sudo fallocate -l 15G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          sudo swapon --show

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: npm install
        if: success() || failure()
        run: |
          npm install

      - name: Initialise d2e
        if: success() || failure()
        id: init
        run: |
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config ./scripts/cli.sh -e -v develop init
      - uses: dorny/paths-filter@v3
        id: file_changes
        with:
          initial-fetch-depth: 1
          filters: |
            flow_base:
              - "flows/base/**"
            flow_i2b2:
              - "flows/i2b2/**"
            flow_data_management:
              - "flows/data_management/**"
            ui: 
              - "ui/**"

      - name: Build Flow base docker image
        if: steps.file_changes.outputs.flow_base == 'true'
        id: build_flow_base_image
        run: |
          docker build --build-arg GIT_COMMIT_ARG=${{ github.sha }} --build-arg BUILD_TYPE=OSS --build-arg GITHUB_PAT=${{ secrets.GITHUB_TOKEN }} --file ./flows/base/Dockerfile --platform linux/amd64 --attest type=provenance,disabled=true --tag ghcr.io/ohdsi/d2e/flow-base:develop ./flows
        
      - name: Build i2b2 docker image
        if: steps.file_changes.outputs.flow_i2b2 == 'true'
        id: build_i2b2_image
        run: |
          docker build --build-arg GIT_COMMIT_ARG=${{ github.sha }} --build-arg BUILD_TYPE=OSS --build-arg GITHUB_PAT=${{ secrets.GITHUB_TOKEN }} --file ./flows/i2b2/Dockerfile --platform linux/amd64 --attest type=provenance,disabled=true --tag ghcr.io/ohdsi/d2e/flow-i2b2:develop ./flows

      - name: Build data management docker image
        if: steps.file_changes.outputs.flow_data_management == 'true'
        id: build_dm_image
        run: |
          docker build --build-arg GIT_COMMIT_ARG=${{ github.sha }} --build-arg BUILD_TYPE=OSS --build-arg GITHUB_PAT=${{ secrets.GITHUB_TOKEN }} --file ./flows/data_management/Dockerfile --platform linux/amd64 --attest type=provenance,disabled=true --tag ghcr.io/ohdsi/d2e/flow-data-management:develop ./flows

      - name: Build docker images
        if: success() || failure()
        id: pull
        run: |
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config ./scripts/cli.sh -e -v develop -d ./functions build
          docker images --format "table {{.ID}}\t{{.Repository}}\t{{.Tag}}"

      - name: Prune images
        if: always()
        id: prune
        run: |
          docker buildx prune -af

      - name: Start services
        if: success() || failure()
        uses: nick-fields/retry@v3
        id: start
        with:
          timeout_seconds: 1800
          retry_wait_seconds: 100
          max_attempts: 2
          retry_on: any
          command: |
            ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config ./scripts/cli.sh -e -v ${{ env.VERSION }}  -d ./functions start
            DC_EXIT_CODE=$?
            DOCKER_STATUS_FILE=../docker-status-${GITHUB_RUN_ID:-ghRunId}-$(date '+%Y%m%dT%H%M%S').txt | tee -a $GITHUB_ENV
            docker ps --format {{.Names}},{{.Status}} 2> /dev/null | sort | tee $DOCKER_STATUS_FILE | tee -a $GITHUB_STEP_SUMMARY
            [ $DC_EXIT_CODE = 0 ] || { echo EXIT DC_EXIT_CODE=$DC_EXIT_CODE && exit $DC_EXIT_CODE; }

      - name: Log status
        if: success() || failure()
        run: |
          echo DC_EXIT_CODE=$DC_EXIT_CODE | tee -a $GITHUB_STEP_SUMMARY
          echo RETRY_EXIT_CODE=${{ steps.start.outputs.exit_code }} | tee -a $GITHUB_STEP_SUMMARY
          echo RETRY_OUTCOME=${{ steps.start.outcome }} | tee -a $GITHUB_STEP_SUMMARY
          echo RETRY_TOTAL_ATTEMPTS=${{ steps.start.outputs.total_attempts }} | tee -a $GITHUB_STEP_SUMMARY
          DC_FAIL_COUNT=$(grep -icE "starting|unhealthy" $DOCKER_STATUS_FILE|| true)
          echo DC_FAIL_COUNT=$DC_FAIL_COUNT | tee -a $GITHUB_STEP_SUMMARY

      - name: Logs
        if: success() || failure()
        run: |
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config ./scripts/cli.sh -e -v ${{ env.VERSION }} -d ./functions logs

      - name: Setupdemo
        if: success() || failure()
        uses: nick-fields/retry@v3
        id: setupdemo
        with:
          timeout_seconds: 1800
          retry_wait_seconds: 100
          max_attempts: 1
          retry_on: any
          command: |
            ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config ./scripts/cli.sh -e -v ${{ env.VERSION }}  -d ./functions setupdemo
            DC_EXIT_CODE=$?
            DOCKER_STATUS_FILE=../docker-status-${GITHUB_RUN_ID:-ghRunId}-$(date '+%Y%m%dT%H%M%S').txt | tee -a $GITHUB_ENV
            docker ps --format {{.Names}},{{.Status}} 2> /dev/null | sort | tee $DOCKER_STATUS_FILE | tee -a $GITHUB_STEP_SUMMARY
            [ $DC_EXIT_CODE = 0 ] || { echo EXIT DC_EXIT_CODE=$DC_EXIT_CODE && exit $DC_EXIT_CODE; }

      - name: Logs
        if: success() || failure()
        run: |
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config ./scripts/cli.sh -e -v ${{ env.VERSION }} -d ./functions logs

      - name: Checkflow
        if: success() || failure()
        uses: nick-fields/retry@v3
        id: checkflow
        with:
          timeout_seconds: 1800
          retry_wait_seconds: 100
          max_attempts: 1
          retry_on: any
          command: |
            ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config ./scripts/cli.sh -e -v ${{ env.VERSION }} -d ./functions checkflow
            DC_EXIT_CODE=$?
            [ $DC_EXIT_CODE = 0 ] || { echo EXIT DC_EXIT_CODE=$DC_EXIT_CODE && exit $DC_EXIT_CODE; }

      - name: Display Prefect Flow Logs
        if: success() || failure()
        run: |
          echo "=== Fetching Prefect Flow Run Logs ===" | tee -a $GITHUB_STEP_SUMMARY
          
          # Get all flow runs from Prefect API via docker exec
          echo "Querying flow runs..."
          FLOW_RUNS=$(docker exec d2e-prefect-server curl -s 'http://localhost:4200/api/flow_runs/filter' \
            -H 'Content-Type: application/json' \
            -d '{"sort": "START_TIME_DESC", "limit": 50}' 2>/dev/null || echo "[]")
          
          echo "Flow runs response length: $(echo "$FLOW_RUNS" | wc -c)"
          
          # Parse and display each flow run with its logs
          echo "$FLOW_RUNS" | jq -r '.[] | "\(.id) | \(.name) | \(.state_type) | \(.start_time)"' 2>/dev/null | head -20 | while read line; do
            FLOW_RUN_ID=$(echo "$line" | cut -d'|' -f1 | tr -d ' ')
            FLOW_NAME=$(echo "$line" | cut -d'|' -f2)
            STATE=$(echo "$line" | cut -d'|' -f3)
            START_TIME=$(echo "$line" | cut -d'|' -f4)
            
            echo "" | tee -a $GITHUB_STEP_SUMMARY
            echo "=== Flow Run: $FLOW_NAME (State: $STATE) ===" | tee -a $GITHUB_STEP_SUMMARY
            echo "ID: $FLOW_RUN_ID | Started: $START_TIME" | tee -a $GITHUB_STEP_SUMMARY
            
            # Get logs for this flow run
            if [ -n "$FLOW_RUN_ID" ]; then
              LOGS=$(docker exec d2e-prefect-server curl -s 'http://localhost:4200/api/logs/filter' \
                -H 'Content-Type: application/json' \
                -d "{\"logs\": {\"flow_run_id\": {\"any_\": [\"$FLOW_RUN_ID\"]}}, \"sort\": \"TIMESTAMP_ASC\", \"limit\": 100}" 2>/dev/null || echo "[]")
              
              echo "$LOGS" | jq -r '.[] | "[\(.level)] \(.timestamp): \(.message)"' 2>/dev/null | head -50 | tee -a $GITHUB_STEP_SUMMARY || echo "No logs found for this flow run"
            fi
          done
          
          echo "" | tee -a $GITHUB_STEP_SUMMARY
          echo "=== End of Prefect Flow Logs ===" | tee -a $GITHUB_STEP_SUMMARY

      - name: UI Setup bun
        if: ${{ steps.file_changes.outputs.ui == 'true' }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.23
      - name: UI Build
        if: ${{ steps.file_changes.outputs.ui == 'true' }}
        working-directory: ./ui
        env:
          CI: false
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl file git
          bun install
          bun build-all 2>&1 | tee build-logs.txt
      - name: Upload UI Build Logs
        if: ${{ steps.file_changes.outputs.ui == 'true' && failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: ui-build-logs
          path: ui/build-logs.txt
      - name: UI docker-compose-local
        if: ${{ steps.file_changes.outputs.ui == 'true' }}
        run: |
          sed -i 's|# - ./ui/resources:/usr/src/local-resources|- ./ui/resources:/usr/src/local-resources|' docker-compose-local.yml

      - name: Restart d2e services
        if: success() || failure()
        run: |
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config ./scripts/cli.sh -e -v ${{ env.VERSION }} -d ./functions stop
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config ./scripts/cli.sh -e -v ${{ env.VERSION }} -d ./functions start

      - name: UI Mounting build
        if: ${{ steps.file_changes.outputs.ui == 'true' }}
        run: |
          docker exec d2e-trex sh -c "rm -r /usr/src/data/plugins/node_modules/\@data2evidence/d2e-ui/resources"
          docker exec d2e-trex sh -c "cp -r /usr/src/local-resources /usr/src/data/plugins/node_modules/\@data2evidence/d2e-ui/resources"

      - name: e2e tests setup
        run: |
          cd ./tests/e2e
          npm install
          npm run init

      - name: e2e tests
        # continue-on-error: true
        run: |
          cd ./tests/e2e
          npm test

      - name: Upload Error Context
        if: always() # Always run, even if the previous step fails
        uses: actions/upload-artifact@v4
        with:
          name: error-context
          path: tests/e2e/test-results/**/*

      - name: Logs
        if: success() || failure()
        run: |
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config ./scripts/cli.sh -e -v ${{ env.VERSION }} -d ./functions logs

      - name: Publish Test Report
        if: always()
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: "./tests/e2e/ctrf/*.json"
          file-report: true

      - name: Stop d2e services
        if: success() || failure()
        id: stop
        run: |
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config ./scripts/cli.sh -e -v ${{ env.VERSION }} -d ./functions stop

      - name: Prune system
        if: always()
        id: prune_system
        run: |
          docker system prune -af
