name: Manual D2E Testing Env

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      timeout_minutes:
        description: 'How long to keep the tunnel open (in minutes)'
        required: true
        default: '30'
        type: string


jobs:
  manual-test:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.ref }}
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install root dependencies
        run: npm install
        
      - name: Make CLI executable
        run: chmod +x ./scripts/cli.sh
          
      - name: Initialize D2E environment
        run: ./scripts/cli.sh -v develop init
        
      - name: Pull D2E images
        run: ./scripts/cli.sh -v develop -e pull
        
      - name: Start D2E services
        run: ./scripts/cli.sh -v develop -e start
        
          
      - name: Setup demo dataset
        run: ./scripts/cli.sh -v develop setupdemo
        
          
          
      - name: Display service status
        run: |
          echo "Docker container status:"
          docker ps
          echo ""
          echo "Port bindings:"
          docker ps --format "table {{.Names}}\t{{.Ports}}"
          
      - name: Starting services
        run: echo "Start up your services before exposing them...."

      - name: Expose tunnel
        uses: codetalkio/expose-tunnel@v1.5.0
        id: expose-tunnel
        with:
          service: bore.pub
          port: 443
          
      - name: Accessing the tunnel url
        run: echo "Tunnel has been started at '${{ steps.expose-tunnel.outputs.tunnel-url }}'"

      - name: Keep tunnel alive for a defined time
        run: |
          timeout_minutes=${{ inputs.timeout_minutes }}
          timeout_seconds=$((timeout_minutes * 60))
          echo "Testing branch: ${{ github.ref }}"
          echo "Keeping SSH tunnel alive for ${timeout_minutes} minutes..."
          sleep $timeout_seconds
          
      - name: Cleanup
        if: always()
        run: |
          echo "🧹 Cleaning up D2E services..."
          ./scripts/cli.sh -v develop stop || true
          docker system prune -f || true
