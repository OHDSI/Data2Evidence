name: Auto-update Issue Dates from Milestone

on:
  issues:
    types: [milestoned, demilestoned]

jobs:
  update-issue-dates:
    runs-on: ubuntu-latest
    steps:
      - name: Get Milestone Information
        if: github.event.action == 'milestoned'
        id: get_info
        run: |
          echo "MILESTONE_DUE_DATE=${{ github.event.issue.milestone.due_on }}" >> $GITHUB_ENV
          echo "MILESTONE_NUMBER=${{ github.event.issue.milestone.number }}" >> $GITHUB_ENV

      - name: Get Previous Milestone Date
        if: github.event.action == 'milestoned'
        id: get_previous_milestone
        uses: actions/github-script@v7
        with:
          script: |
            const response = await github.rest.issues.listMilestones({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              sort: 'due_on',
              direction: 'asc'
            });

            const milestones = response.data;
            const currentMilestoneIndex = milestones.findIndex(m => m.number == process.env.MILESTONE_NUMBER);

            let previousMilestoneDueDate = '';
            if (currentMilestoneIndex > 0) {
              previousMilestoneDueDate = milestones[currentMilestoneIndex - 1].due_on;
            }
            core.setOutput('previous_milestone_due_date', previousMilestoneDueDate);

      - name: Update or Clear Project Item Fields
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const projectId = "45";
            const startDateFieldId = "182595135";
            const endDateFieldId = "182595136";

            const issueNodeId = "${{ github.event.issue.node_id }}";

            if (context.payload.action === 'milestoned') {
              const startDate = '${{ steps.get_previous_milestone.outputs.previous_milestone_due_date }}';
              const endDate = process.env.MILESTONE_DUE_DATE;

              const updateMutation = `
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: Date!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId, itemId: $itemId, fieldId: $fieldId, value: { date: $value }
                  }) { projectV2Item { id } }
                }`;

              if (startDate && startDateFieldId) {
                console.log(`Setting Start Date to: ${startDate}`);
                await github.graphql(updateMutation, { projectId, itemId: issueNodeId, fieldId: startDateFieldId, value: startDate });
              }
              if (endDate && endDateFieldId) {
                console.log(`Setting End Date to: ${endDate}`);
                await github.graphql(updateMutation, { projectId, itemId: issueNodeId, fieldId: endDateFieldId, value: endDate });
              }
            }
            else if (context.payload.action === 'demilestoned') {
              const clearMutation = `
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!) {
                  clearProjectV2ItemFieldValue(input: {
                    projectId: $projectId, itemId: $itemId, fieldId: $fieldId
                  }) { projectV2Item { id } }
                }`;

              if (startDateFieldId) {
                console.log('Clearing Start Date field.');
                await github.graphql(clearMutation, { projectId, itemId: issueNodeId, fieldId: startDateFieldId });
              }
              if (endDateFieldId) {
                console.log('Clearing End Date field.');
                await github.graphql(clearMutation, { projectId, itemId: issueNodeId, fieldId: endDateFieldId });
              }
            }
