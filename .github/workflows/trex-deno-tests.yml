name: Run Trex Deno Tests

on:
  workflow_dispatch: # Allow manual triggering
  pull_request:
    types: [opened, ready_for_review, reopened, synchronize]
  push:
    branches:
      - develop

jobs:
  test-authorization:
    name: Run Authorization Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Show current commit for verification
        run: |
          echo "Testing commit:"
          git rev-parse HEAD
          git log -1 --format="%an: %s"

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.1.13

      - name: Run Authorization Tests
        working-directory: services/trex
        run: deno test --no-check --allow-env ./core/server/auth/authz.test.ts

  test-load-plugin:
    name: Run Load Plugin Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Show current commit for verification
        run: |
          echo "Testing commit:"
          git rev-parse HEAD
          git log -1 --format="%an: %s"

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.1.13

      - name: Run Load UI Plugin Tests
        working-directory: services/trex
        run: deno test --no-check --allow-env ./core/server/plugin/tests/ui.test.ts
